<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="超勤簿">
<meta name="theme-color" content="#1a4d8f">
<title>超勤簿入力</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{
  --bg:#f3f4f6; --surface:#fff; --ink:#111827; --muted:#6b7280; --border:#d1d5db;
  --accent:#1a4d8f; --accent-soft:#e0eaf7; --warn:#b45309; --danger:#b91c1c;
  --weekend:#fef2f2; --weekday:#fff;
  --pad:14px; --radius:10px;
  --mono:"SF Mono","JetBrains Mono","Consolas",monospace;
  --sans:"Hiragino Sans","Yu Gothic UI","Meiryo",system-ui,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5}
input,select,button,textarea{font:inherit;color:inherit}
input,select,textarea{padding:6px 8px;border:1px solid var(--border);border-radius:6px;background:#fff;min-height:34px}
input[type=time]{font-variant-numeric:tabular-nums;font-family:var(--mono)}
input:focus,select:focus,textarea:focus{outline:2px solid var(--accent);outline-offset:-1px;border-color:var(--accent)}
button{cursor:pointer;border:1px solid var(--border);background:#fff;border-radius:6px;padding:6px 12px;min-height:34px}
button:hover{background:#f9fafb}
button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
button.primary:hover{background:#163e72}
button.ghost{background:transparent;border-color:transparent;color:var(--accent);padding:4px 8px}
button.ghost:hover{background:var(--accent-soft)}
button.icon{padding:4px 8px;min-width:34px}
button.danger{color:var(--danger);border-color:#fca5a5}
button.danger:hover{background:#fef2f2}
.hide{display:none!important}

/* Header */
header{background:var(--accent);color:#fff;padding:10px var(--pad);position:sticky;top:0;z-index:50;box-shadow:0 1px 3px rgba(0,0,0,.15)}
header .row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
header h1{font-size:16px;margin:0;font-weight:600}
header .month-picker{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.15);border-radius:8px;padding:2px 4px}
header .month-picker button{background:transparent;border:none;color:#fff;padding:4px 8px;font-size:16px;min-height:30px}
header .month-picker .label{padding:0 8px;font-weight:600;min-width:130px;text-align:center}
header .tools{margin-left:auto;display:flex;gap:6px}
header .tools button{background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.3);font-size:12px}
header .tools button:hover{background:rgba(255,255,255,.28)}

main{max-width:980px;margin:0 auto;padding:var(--pad);padding-bottom:80px}

/* Sections */
.section{background:var(--surface);border-radius:var(--radius);padding:var(--pad);margin-bottom:14px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.section h2{margin:0 0 10px;font-size:14px;color:var(--muted);font-weight:600;display:flex;align-items:center;justify-content:space-between}
.section h2 .actions{display:flex;gap:6px}

/* Profile grid */
.profile-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:12px;color:var(--muted)}

/* Summary */
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px}
.stat{background:#f9fafb;border:1px solid var(--border);border-radius:8px;padding:10px}
.stat .label{font-size:11px;color:var(--muted)}
.stat .value{font-family:var(--mono);font-size:18px;font-weight:600;margin-top:2px}
.stat.total .value{color:var(--accent)}

/* Day cards */
.days{display:flex;flex-direction:column;gap:8px}
.day{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.day.weekend{background:var(--weekend)}
.day.holiday{background:#fef9e7}
.day.empty{opacity:.55}
.day-head{display:grid;grid-template-columns:auto 1fr auto auto;gap:10px;align-items:center;padding:10px 12px;cursor:pointer;user-select:none}
.day-head:hover{background:rgba(0,0,0,.02)}
.day .date{font-family:var(--mono);font-weight:600;font-size:15px;min-width:62px}
.day .dow{font-size:13px;color:var(--muted);margin-left:2px}
.day .dow.sat{color:#1e40af}
.day .dow.sun{color:#b91c1c}
.day .hol-name{display:inline-block;margin-left:6px;font-size:11px;color:#b45309;background:#fef3c7;padding:1px 6px;border-radius:4px;vertical-align:middle}
.day .summary-line{font-size:12px;color:var(--muted);font-family:var(--mono)}
.day .summary-line.has{color:var(--ink);font-weight:500}
.day .summary-line.has::before{content:"⏱ ";color:var(--accent)}
.day .shift-tag{display:inline-block;padding:1px 8px;border-radius:99px;background:#e5e7eb;font-size:11px;font-weight:600;color:#374151}
.day .shift-tag.duty{background:#fde68a;color:#92400e}
.day .shift-tag.holi{background:#fecaca;color:#991b1b}
.day .chev{color:var(--muted);font-size:18px;transition:transform .15s}
.day.open .chev{transform:rotate(90deg)}
.day-body{padding:0 12px 12px;border-top:1px dashed var(--border);display:none}
.day.open .day-body{display:block}

.row-fields{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-top:10px}
.slot{display:grid;grid-template-columns:auto 1fr auto 1fr auto;gap:6px;align-items:center;margin-top:6px}
.slot .sep{color:var(--muted)}
.slot .label-mini{font-size:11px;color:var(--muted);min-width:36px}
.slot .break-fields{display:grid;grid-template-columns:1fr auto 1fr;gap:4px;align-items:center}
.slot-row{display:flex;flex-direction:column;gap:4px;padding:8px;background:#f9fafb;border:1px solid var(--border);border-radius:8px;margin-top:6px}
.slot-row .row-times{display:grid;grid-template-columns:1fr auto 1fr;gap:6px;align-items:center}
.slot-row .row-break{display:grid;grid-template-columns:auto 1fr auto 1fr auto;gap:6px;align-items:center;font-size:12px;color:var(--muted)}
.slot-row .slot-actions{display:flex;gap:4px;justify-content:flex-end}
.slot-row .slot-actions button{font-size:11px;padding:2px 6px;min-height:24px}

.quick-pad{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.quick-pad button{font-size:11px;padding:3px 8px;min-height:26px;background:#fff;border-color:var(--border)}
.quick-pad button.suggestion{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}

.biz-section{margin-top:8px;padding:8px;background:#f8fafc;border:1px solid var(--border);border-radius:8px}
.biz-summary{display:flex;align-items:center;gap:8px}
.biz-summary .biz-cap{font-size:11px;color:var(--muted);background:#e5e7eb;padding:2px 7px;border-radius:4px;flex-shrink:0}
.biz-summary .biz-val{flex:1;font-size:13px;font-weight:600;color:#1e3a8a}
.biz-summary .biz-toggle{font-size:11px;padding:3px 12px;min-height:26px;background:#fff;border-color:var(--border);flex-shrink:0}
.biz-editor{display:none;margin-top:8px;padding-top:8px;border-top:1px dashed var(--border)}
.biz-section[data-biz-open="1"] .biz-editor{display:block}
.biz-section[data-biz-open="1"] .biz-summary .biz-toggle{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}
.code-tabs{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.code-tabs button{font-size:12px;padding:5px 9px;min-height:30px;background:#fff;border:1px solid var(--border);border-radius:6px}
.code-tabs button.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}

.templates{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.templates button{font-size:11px;padding:3px 8px;min-height:24px;background:#eff6ff;border-color:#bfdbfe;color:#1e3a8a}
.templates button:hover{background:#dbeafe}
.templates .del{font-size:10px;color:var(--danger);background:transparent;border:none;padding:0 2px;min-height:auto}

/* Day-level quick actions */
.day-quick{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;padding-top:8px;border-top:1px dashed var(--border)}
.day-quick button{font-size:11px;padding:3px 8px;min-height:26px}
.day-quick button.primary-soft{background:#fef3c7;border-color:#fbbf24;color:#92400e;font-weight:600}
.day-quick button.primary-soft:hover{background:#fde68a}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:12px;max-width:560px;width:100%;max-height:90vh;overflow:auto;padding:20px}
.modal h3{margin:0 0 12px}
.modal .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

/* Floating action bar */
.fab{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:10px 18px;border-radius:99px;box-shadow:0 4px 12px rgba(26,77,143,.4);display:flex;gap:8px;z-index:40}
.fab button{background:transparent;border:none;color:#fff;padding:4px 12px;font-weight:600}
.fab button:hover{background:rgba(255,255,255,.15);border-radius:99px}

/* Print view */
.print-only{display:none}

@media print{
  @page{size:A4 portrait;margin:8mm 6mm}
  body{background:#fff;font-size:9pt}
  header,.section:not(.profile-section),.fab,.no-print,main>.section,.summary-section{display:none!important}
  .print-only{display:block!important}
  main{max-width:none;padding:0;margin:0}
  .print-sheet{font-family:var(--sans);color:#000}
}
.print-sheet{display:none}
/* PDF生成時の一時表示用 */
.print-sheet.rendering{display:block!important}

.print-sheet .ph{display:grid;grid-template-columns:auto 1fr auto;align-items:center;margin-bottom:4px}
.print-sheet .ptitle{font-size:14pt;font-weight:700;text-align:center}
.print-sheet .meta{display:grid;grid-template-columns:auto auto 1fr auto auto auto;gap:6px;font-size:9pt;margin-bottom:6px;align-items:end}
.print-sheet .meta div{border-bottom:1px solid #000;padding:2px 4px;min-height:18px}
.print-sheet .meta .lbl{border-bottom:none;font-weight:600}
.print-sheet table{width:100%;border-collapse:collapse;font-size:7.8pt}
.print-sheet th, .print-sheet td{border:1px solid #000;padding:1px 2px;vertical-align:middle;text-align:center;line-height:1.15}
.print-sheet th{background:#e5e7eb;font-weight:600;font-size:7pt}
.print-sheet .h-row1 th{height:auto}
.print-sheet td.date{font-family:var(--mono);font-weight:600;text-align:center;font-size:8pt}
.print-sheet td.dow{font-size:7.5pt;color:#555}
.print-sheet td.shift{font-size:8pt;font-weight:600}
.print-sheet td.time{font-family:var(--mono);font-size:7.5pt}
.print-sheet td.biz{text-align:left;font-size:7.5pt;padding:1px 3px}
.print-sheet .saturday td.date,.print-sheet .saturday td.dow{color:#1e40af}
.print-sheet .sunday td.date,.print-sheet .sunday td.dow{color:#991b1b}
.print-sheet .holiday-bg{background:#fef9e7}
.print-sheet .footer-totals{margin-top:6px;font-size:8pt}
.print-sheet .footer-totals table{width:100%}
.print-sheet .notes{font-size:7pt;margin-top:6px;color:#333}
.print-sheet .notes ol{margin:2px 0 0 16px;padding:0}

/* Onboarding hint */
.hint{background:#fef9e7;border-left:3px solid var(--warn);padding:8px 12px;border-radius:6px;font-size:12px;color:#78350f;margin-bottom:10px}

/* Mobile tweaks */
@media (max-width:600px){
  header h1{font-size:14px}
  header .month-picker .label{min-width:110px;font-size:13px}
  header .tools button{padding:4px 8px}
  .day-head{grid-template-columns:auto 1fr auto;gap:6px;padding:9px 10px}
  .day .chev{display:none}
}
</style>
</head>
<body>

<header>
  <div class="row">
    <h1>超勤簿</h1>
    <div class="month-picker">
      <button id="btn-prev" aria-label="前月">‹</button>
      <span class="label" id="month-label">2026年4月報告分</span>
      <button id="btn-next" aria-label="次月">›</button>
    </div>
    <div class="tools">
      <button id="btn-excel">📗 公式Excel</button>
      <button id="btn-pdf">📄 PDF</button>
      <button id="btn-menu">⋯ メニュー</button>
    </div>
  </div>
</header>

<main>

<section class="section profile-section">
  <h2>職員情報
    <span class="actions"><button class="ghost" id="btn-edit-profile">編集</button></span>
  </h2>
  <div class="profile-grid">
    <div class="field"><label>氏名</label><input id="p-name" placeholder="例: 中野 謙"></div>
    <div class="field"><label>職員番号</label><input id="p-eid" placeholder="例: T26237"></div>
    <div class="field"><label>所属</label><input id="p-aff" placeholder="例: こども病院"></div>
    <div class="field"><label>診療科</label><input id="p-dept" placeholder="例: 循環器内科"></div>
  </div>
</section>

<section class="section summary-section">
  <h2>今月の集計</h2>
  <div class="summary" id="summary"></div>
</section>

<section class="section">
  <h2>日々の入力
    <span class="actions">
      <button class="ghost" id="btn-expand-all">全部開く</button>
      <button class="ghost" id="btn-collapse-all">全部閉じる</button>
    </span>
  </h2>
  <div id="hint-empty" class="hint hide">勤務形態を「空白(通常)」のままにすると平日扱い、土日・祝日は自動で休日扱いになります。</div>
  <div class="days" id="days"></div>
</section>

</main>

<!-- Modal: menu -->
<div class="modal-bg" id="modal-menu">
  <div class="modal">
    <h3>メニュー / データ管理</h3>
    <p style="color:var(--muted);font-size:12px;margin:0 0 12px">入力データはブラウザ内に自動保存されます。バックアップする場合はエクスポート/インポート機能を使ってください。</p>

    <div class="field"><label>業務内容テンプレート (現在の登録)</label>
      <div class="templates" id="templates-list"></div>
      <div style="display:flex;gap:6px;margin-top:8px">
        <select id="tpl-code" style="width:130px">
          <option value="①分娩">①分娩</option>
          <option value="②手術">②手術</option>
          <option value="③検査">③検査</option>
          <option value="④重症患者">④重症患者</option>
          <option value="⑤救急患者">⑤救急患者</option>
          <option value="⑥外来患者">⑥外来患者</option>
          <option value="⑦入院診療" selected>⑦入院診療</option>
          <option value="⑧オンコール">⑧オンコール</option>
        </select>
        <input id="tpl-content" placeholder="業務内容 (例: カンファレンス・病棟業務)" style="flex:1">
        <button id="tpl-add">追加</button>
      </div>
    </div>

    <hr style="margin:14px 0;border:none;border-top:1px solid var(--border)">

    <div class="field"><label>祝日の扱い</label>
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer">
        <input type="checkbox" id="use-jp-holidays" style="width:auto;min-height:auto">
        <span>日本の祝日をカレンダー通り休日扱いにする</span>
      </label>
      <small style="color:var(--muted)">国立天文台の暦要項に基づく公式の祝日（振替休日・国民の休日を含む / 2025〜2027年に対応）</small>
    </div>

    <div class="field"><label>追加の休日 (yyyy-mm-dd 形式, カンマ区切り)</label>
      <textarea id="holidays" rows="2" placeholder="例: 2026-12-29,2026-12-30,2026-12-31"></textarea>
      <small style="color:var(--muted)">年末年始や病院独自の休日など、上記の祝日以外で休日扱いしたい日を入力</small>
    </div>

    <hr style="margin:14px 0;border:none;border-top:1px solid var(--border)">

    <hr style="margin:14px 0;border:none;border-top:1px solid var(--border)">

    <div class="field"><label>出力</label>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button id="btn-print">🖨 命令簿フォーマットで印刷</button>
      </div>
      <small style="color:var(--muted)">「公式Excel」ボタンは元のExcel様式そのままで書き出します</small>
    </div>

    <div class="field"><label>データ操作</label>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button id="btn-export">📦 全データをJSONエクスポート</button>
        <button id="btn-import">📥 JSONインポート</button>
        <button class="danger" id="btn-clear-month">この月をクリア</button>
      </div>
      <input type="file" id="file-import" accept=".json" style="display:none">
    </div>

    <div class="modal-actions">
      <button class="primary" id="btn-menu-close">閉じる</button>
    </div>
  </div>
</div>

<!-- Print view -->
<div class="print-sheet print-only" id="print-sheet"></div>

<script>
'use strict';

// ============================================================
// CONSTANTS
// ============================================================
const BIZ_CODES = ['①分娩','②手術','③検査','④重症患者','⑤救急患者','⑥外来患者','⑦入院診療','⑧オンコール'];
// 業務コード・内容のデフォルト (変更しない限りこの値が使われる)
const DEFAULT_CODE = '⑦入院診療';
const DEFAULT_CONTENT = 'カンファレンス・病棟業務';
function effectiveCode(day){ return (day && day.code) ? day.code : DEFAULT_CODE; }
function effectiveContent(day){ return (day && day.content) ? day.content : DEFAULT_CONTENT; }
const SHIFTS = [
  {v:'', label:'(空白) 通常勤務', short:''},
  {v:'休', label:'休 (休日)', short:'休'},
  {v:'振', label:'振 (振替勤務)', short:'振'},
  {v:'育', label:'育 (育児短時間)', short:'育'},
  {v:'宿', label:'宿 (宿直)', short:'宿'},
  {v:'宿(休)', label:'宿(休) (休日宿直)', short:'宿(休)'},
  {v:'日', label:'日 (日直)', short:'日'},
  {v:'宿日', label:'宿日 (宿日直)', short:'宿日'},
];
const QUICK_START = ['7:30','8:30','17:30','18:00'];
const QUICK_END_DELTAS = [30, 60, 90, 120, 180]; // minutes after start

// ============================================================
// 日本の祝日 (国立天文台 暦要項に基づく公式データ。振替休日・国民の休日を含む)
// 出典: 国立天文台暦計算室 https://eco.mtk.nao.ac.jp/koyomi/yoko/
// ============================================================
const JP_HOLIDAYS = {
  // 2025年 (令和7年)
  '2025-01-01':'元日', '2025-01-13':'成人の日', '2025-02-11':'建国記念の日',
  '2025-02-23':'天皇誕生日', '2025-02-24':'休日(振替)', '2025-03-20':'春分の日',
  '2025-04-29':'昭和の日', '2025-05-03':'憲法記念日', '2025-05-04':'みどりの日',
  '2025-05-05':'こどもの日', '2025-05-06':'休日(振替)', '2025-07-21':'海の日',
  '2025-08-11':'山の日', '2025-09-15':'敬老の日', '2025-09-23':'秋分の日',
  '2025-10-13':'スポーツの日', '2025-11-03':'文化の日', '2025-11-23':'勤労感謝の日',
  '2025-11-24':'休日(振替)',
  // 2026年 (令和8年)
  '2026-01-01':'元日', '2026-01-12':'成人の日', '2026-02-11':'建国記念の日',
  '2026-02-23':'天皇誕生日', '2026-03-20':'春分の日', '2026-04-29':'昭和の日',
  '2026-05-03':'憲法記念日', '2026-05-04':'みどりの日', '2026-05-05':'こどもの日',
  '2026-05-06':'休日(振替)', '2026-07-20':'海の日', '2026-08-11':'山の日',
  '2026-09-21':'敬老の日', '2026-09-22':'国民の休日', '2026-09-23':'秋分の日',
  '2026-10-12':'スポーツの日', '2026-11-03':'文化の日', '2026-11-23':'勤労感謝の日',
  // 2027年 (令和9年)
  '2027-01-01':'元日', '2027-01-11':'成人の日', '2027-02-11':'建国記念の日',
  '2027-02-23':'天皇誕生日', '2027-03-21':'春分の日', '2027-03-22':'休日(振替)',

// ============================================================
// STATE
// ============================================================
let state = loadState();
// 今日の日付が含まれる「報告月」を返す
// 報告期間は前月21日〜当月20日。21日以降は翌月報告分にあたる
function currentReportMonth(){
  const now = new Date();
  let y = now.getFullYear();
  let m = now.getMonth() + 1; // 1-12
  if(now.getDate() >= 21){
    m += 1;
    if(m > 12){ m = 1; y += 1; }
  }
  return `${y}-${String(m).padStart(2,'0')}`;
}
let currentMonth = currentReportMonth(); // "yyyy-mm"

function defaultState(){
  return {
    profile:{name:'', employeeId:'', affiliation:'こども病院', department:''},
    months:{},
    templates:[
      {code:'⑦入院診療', content:'カンファレンス・病棟業務'}
    ],
    holidays:'',
    useJpHolidays:true
  };
}
function loadState(){
  try{
    const raw = localStorage.getItem('chokin-app-v1');
    if(!raw) return defaultState();
    const s = JSON.parse(raw);
    return {...defaultState(), ...s, profile:{...defaultState().profile, ...(s.profile||{})}};
  }catch(e){ return defaultState(); }
}
function saveState(){
  localStorage.setItem('chokin-app-v1', JSON.stringify(state));
}

function getMonth(key){
  if(!state.months[key]) state.months[key] = {days:{}};
  return state.months[key];
}
function getDay(key, dateStr){
  const m = getMonth(key);
  if(!m.days[dateStr]) m.days[dateStr] = {shift:'', slots:[], code:'', content:''};
  return m.days[dateStr];
}

// ============================================================
// DATE UTILS
// ============================================================
function ymKey(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }
function ymdKey(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function parseYmd(s){ const [y,m,d] = s.split('-').map(Number); return new Date(y,m-1,d); }
function ymParts(key){ const [y,m] = key.split('-').map(Number); return {y, m}; }

// 報告期間: 前月21日 ~ 当月20日
function getReportPeriod(ymKey){
  const {y,m} = ymParts(ymKey);
  const start = new Date(y, m-2, 21); // 前月21日 (m-1-1=m-2)
  const end = new Date(y, m-1, 20);
  return {start, end};
}
function getDaysInPeriod(ymKey){
  const {start,end} = getReportPeriod(ymKey);
  const days = [];
  for(let d = new Date(start); d <= end; d.setDate(d.getDate()+1)){
    days.push(new Date(d));
  }
  return days;
}

const DOW_JA = ['日','月','火','水','木','金','土'];
function dowJa(d){ return DOW_JA[d.getDay()]; }

function getHolidaySet(){
  const s = new Set((state.holidays||'').split(/[,\s]+/).filter(Boolean));
  if(state.useJpHolidays !== false){
    for(const dateStr in JP_HOLIDAYS) s.add(dateStr);
  }
  return s;
}
// 祝日名 (公式祝日のみ。カレンダー通り休日扱いが有効なときに名前を返す)
function getHolidayName(d){
  if(state.useJpHolidays === false) return '';
  return JP_HOLIDAYS[ymdKey(d)] || '';
}
function isWeekend(d){ return d.getDay() === 0 || d.getDay() === 6; }
function isHoliday(d){ return getHolidaySet().has(ymdKey(d)); }

function shiftMakesHoliday(shift){
  return shift === '休' || shift === '振' || shift === '日' || shift === '宿日' || shift === '宿(休)';
}
function isHolidayDay(d, day){
  if(shiftMakesHoliday(day.shift)) return true;
  if(isWeekend(d)) return true;
  if(isHoliday(d)) return true;
  return false;
}

// ============================================================
// TIME UTILS
// ============================================================
function timeToMinutes(t){
  if(!t) return null;
  const [h,m] = t.split(':').map(Number);
  return h*60 + m;
}
function minutesToTime(min){
  const h = Math.floor(min/60), m = min%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}
function minutesToHourStr(mins){
  if(!mins) return '0:00';
  const h = Math.floor(mins/60), m = mins%60;
  return `${h}:${String(m).padStart(2,'0')}`;
}
function addMinutesToTime(t, delta){
  const m = timeToMinutes(t);
  if(m == null) return null;
  return minutesToTime(Math.max(0, Math.min(24*60, m+delta)));
}

// 時間範囲 [s,e) を区分ごとに分割
// 戻り値: {dayBefore22, dayAfter22} for daytime range 5:00-22:00 vs 22:00-29:00
// 簡略化: 一日内のみ扱う。夜勤の場合は24:00で切って翌日扱い (ユーザーが2つに分割入力)
function splitTimeRange(start, end){
  // start, end in minutes. result: {normal: 5:00-22:00 within range, late: outside}
  const dayStart = 5*60, dayEnd = 22*60;
  if(end <= start) return {normal:0, late:0};
  let normal = 0, late = 0;
  // overlap with [5:00, 22:00]
  const nStart = Math.max(start, dayStart);
  const nEnd = Math.min(end, dayEnd);
  if(nEnd > nStart) normal += nEnd - nStart;
  // overlap with [0:00, 5:00]
  const e1 = Math.min(end, dayStart);
  if(e1 > start) late += e1 - start;
  // overlap with [22:00, 24:00]
  const s2 = Math.max(start, dayEnd);
  if(end > s2) late += end - s2;
  return {normal, late};
}

// 1日の集計
function dayTotals(date, day){
  const isHol = isHolidayDay(date, day);
  let normal = 0, late = 0;
  for(const slot of day.slots){
    const s = timeToMinutes(slot.start), e = timeToMinutes(slot.end);
    if(s == null || e == null || e <= s) continue;
    const work = splitTimeRange(s, e);
    let brkN = 0, brkL = 0;
    const bs = timeToMinutes(slot.breakStart), be = timeToMinutes(slot.breakEnd);
    if(bs != null && be != null && be > bs){
      const brk = splitTimeRange(Math.max(s, bs), Math.min(e, be));
      brkN = brk.normal; brkL = brk.late;
    }
    normal += work.normal - brkN;
    late += work.late - brkL;
  }
  return {
    weekday_5_22: isHol ? 0 : normal,
    weekday_22_5: isHol ? 0 : late,
    holiday_5_22: isHol ? normal : 0,
    holiday_22_5: isHol ? late : 0,
    isHoliday: isHol
  };
}
// 月集計
function monthTotals(ymKey){
  const days = getDaysInPeriod(ymKey);
  const m = getMonth(ymKey);
  let t = {weekday_5_22:0, weekday_22_5:0, holiday_5_22:0, holiday_22_5:0};
  for(const d of days){
    const key = ymdKey(d);
    if(!m.days[key]) continue;
    const dt = dayTotals(d, m.days[key]);
    t.weekday_5_22 += dt.weekday_5_22;
    t.weekday_22_5 += dt.weekday_22_5;
    t.holiday_5_22 += dt.holiday_5_22;
    t.holiday_22_5 += dt.holiday_22_5;
  }
  t.total = t.weekday_5_22 + t.weekday_22_5 + t.holiday_5_22 + t.holiday_22_5;
  return t;
}

// ============================================================
// RENDER
// ============================================================
function renderHeader(){
  const {y,m} = ymParts(currentMonth);
  document.getElementById('month-label').textContent = `${y}年${m}月報告分`;
}
function renderProfile(){
  document.getElementById('p-name').value = state.profile.name || '';
  document.getElementById('p-eid').value = state.profile.employeeId || '';
  document.getElementById('p-aff').value = state.profile.affiliation || '';
  document.getElementById('p-dept').value = state.profile.department || '';
}
function renderSummary(){
  const t = monthTotals(currentMonth);
  const el = document.getElementById('summary');
  el.innerHTML = `
    <div class="stat"><div class="label">平日 5-22時 (125/100)</div><div class="value">${minutesToHourStr(t.weekday_5_22)}</div></div>
    <div class="stat"><div class="label">平日 22-5時 (150/100)</div><div class="value">${minutesToHourStr(t.weekday_22_5)}</div></div>
    <div class="stat"><div class="label">休日 5-22時 (135/100)</div><div class="value">${minutesToHourStr(t.holiday_5_22)}</div></div>
    <div class="stat"><div class="label">休日 22-5時 (160/100)</div><div class="value">${minutesToHourStr(t.holiday_22_5)}</div></div>
    <div class="stat total"><div class="label">合計超過勤務時間</div><div class="value">${minutesToHourStr(t.total)}</div></div>
  `;
}

function shiftSelectHtml(value){
  return `<select data-field="shift">${SHIFTS.map(s=>`<option value="${s.v}" ${s.v===value?'selected':''}>${s.label}</option>`).join('')}</select>`;
}
function codeSelectHtml(value){
  return `<select data-field="code"><option value="">(業務コード未選択)</option>${BIZ_CODES.map(c=>`<option value="${c}" ${c===value?'selected':''}>${c}</option>`).join('')}</select>`;
}

function renderDays(){
  const days = getDaysInPeriod(currentMonth);
  const m = getMonth(currentMonth);
  const container = document.getElementById('days');
  container.innerHTML = '';

  const openDates = window._openDays || new Set();

  let anyEntry = false;
  for(const d of days){
    const key = ymdKey(d);
    const dayData = m.days[key];
    const hasData = dayData && (dayData.shift || (dayData.slots && dayData.slots.length>0) || dayData.code);
    if(hasData) anyEntry = true;
    const dt = hasData ? dayTotals(d, dayData) : null;
    const totalMin = dt ? (dt.weekday_5_22+dt.weekday_22_5+dt.holiday_5_22+dt.holiday_22_5) : 0;

    const card = document.createElement('div');
    const isWk = isWeekend(d);
    const isHol = isHoliday(d);
    card.className = 'day' + (isWk?' weekend':'') + (isHol?' holiday':'') + (!hasData?' empty':'') + (openDates.has(key)?' open':'');
    card.dataset.date = key;

    const dow = dowJa(d);
    const dowCls = d.getDay()===0?'sun':(d.getDay()===6?'sat':'');
    const holName = getHolidayName(d);
    const holLabel = holName ? `<span class="hol-name">${holName}</span>` : '';
    const shiftTag = dayData?.shift ? `<span class="shift-tag ${dayData.shift==='宿'||dayData.shift==='宿(休)'||dayData.shift==='日'||dayData.shift==='宿日'?'duty':'holi'}">${dayData.shift}</span>` : '';
    let summaryLine = '';
    if(hasData && totalMin > 0){
      const slotsDesc = (dayData.slots||[]).filter(s=>s.start&&s.end).map(s=>`${s.start}-${s.end}`).join(' / ');
      summaryLine = `<span class="summary-line has">${slotsDesc} (計${minutesToHourStr(totalMin)})</span>`;
    } else if(hasData && dayData.shift){
      summaryLine = `<span class="summary-line">${dayData.shift}</span>`;
    } else {
      summaryLine = `<span class="summary-line">—</span>`;
    }

    card.innerHTML = `
      <div class="day-head" data-toggle>
        <div><span class="date">${d.getMonth()+1}/${d.getDate()}</span><span class="dow ${dowCls}"> (${dow})</span>${holLabel}</div>
        <div>${summaryLine}</div>
        <div>${shiftTag}</div>
        <div class="chev">›</div>
      </div>
      <div class="day-body"></div>
    `;
    container.appendChild(card);

    if(openDates.has(key)) renderDayBody(card, d);
  }

  document.getElementById('hint-empty').classList.toggle('hide', anyEntry);

  // Wire toggles
  container.querySelectorAll('[data-toggle]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const card = el.closest('.day');
      const key = card.dataset.date;
      if(!window._openDays) window._openDays = new Set();
      if(card.classList.contains('open')){
        card.classList.remove('open');
        window._openDays.delete(key);
      } else {
        card.classList.add('open');
        window._openDays.add(key);
        const date = parseYmd(key);
        renderDayBody(card, date);
      }
    });
  });
}

function renderDayBody(card, date){
  const key = ymdKey(date);
  const day = getDay(currentMonth, key);
  if(!day.slots) day.slots = [];

  const body = card.querySelector('.day-body');
  const slotsHtml = day.slots.map((s,i)=>renderSlot(s, i)).join('');

  body.innerHTML = `
    <div class="row-fields">
      <div class="field"><label>勤務形態</label>${shiftSelectHtml(day.shift)}</div>
    </div>

    <div class="field" style="margin-top:8px"><label>実績勤務時間 (最大3枠/日)</label>
      <div class="slots-wrap">${slotsHtml || '<div style="color:var(--muted);font-size:12px;padding:6px 0">勤務時間なし</div>'}</div>
      ${day.slots.length < 3 ? `<button class="ghost" data-add-slot style="margin-top:4px">+ 時間帯を追加</button>` : ''}
    </div>

    <div class="biz-section" data-biz-open="${window._bizOpen && window._bizOpen.has(key) ? '1':'0'}">
      <div class="biz-summary">
        <span class="biz-cap">業務</span>
        <span class="biz-val" data-biz-val>${effectiveCode(day)} ・ ${escapeHtml(effectiveContent(day))}</span>
        <button class="biz-toggle" data-biz-toggle>変更</button>
      </div>
      <div class="biz-editor">
        <label style="font-size:11px;color:var(--muted)">業務コード（タブで選択）</label>
        <div class="code-tabs">
          ${BIZ_CODES.map(c=>`<button data-code-tab="${c}" class="${c===effectiveCode(day)?'active':''}">${c}</button>`).join('')}
        </div>
        <label style="font-size:11px;color:var(--muted);margin-top:8px;display:block">業務内容</label>
        <input data-field="content" value="${escapeHtml(day.content||'')}" placeholder="${DEFAULT_CONTENT}">
        <div style="text-align:right;margin-top:6px">
          <button class="ghost" data-biz-toggle style="font-size:11px">閉じる</button>
        </div>
      </div>
    </div>

    <div class="templates" data-templates></div>

    <div class="day-quick">
      <button data-quick="morning-conf" class="primary-soft">☀️ 朝カンファ (7:30-8:15)</button>
      <button data-quick="prev">← 前日と同じ内容</button>
      <button data-quick="duplicate-week">→ 来週の同曜日にコピー</button>
      <button data-quick="clear" class="danger">この日をクリア</button>
    </div>
  `;

  // Render templates
  renderTemplatesInline(body.querySelector('[data-templates]'));

  // Wire events
  body.querySelector('[data-field="shift"]').addEventListener('change', e=>{
    day.shift = e.target.value;
    saveState(); renderSummary();
    updateSummaryLine(card, date, day);
  });
  // 業務欄: 折りたたみトグル
  window._bizOpen = window._bizOpen || new Set();
  const bizSection = body.querySelector('.biz-section');
  body.querySelectorAll('[data-biz-toggle]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const open = bizSection.dataset.bizOpen === '1';
      bizSection.dataset.bizOpen = open ? '0' : '1';
      if(open) window._bizOpen.delete(key); else window._bizOpen.add(key);
    });
  });
  // 業務コード: タブ選択
  body.querySelectorAll('[data-code-tab]').forEach(tab=>{
    tab.addEventListener('click', ()=>{
      day.code = tab.dataset.codeTab;
      body.querySelectorAll('[data-code-tab]').forEach(t=>t.classList.toggle('active', t===tab));
      body.querySelector('[data-biz-val]').textContent = effectiveCode(day) + ' ・ ' + effectiveContent(day);
      saveState();
    });
  });
  body.querySelector('[data-field="content"]').addEventListener('input', e=>{
    day.content = e.target.value; saveState();
    body.querySelector('[data-biz-val]').textContent = effectiveCode(day) + ' ・ ' + effectiveContent(day);
  });

  // Slot inputs
  body.querySelectorAll('.slot-row').forEach((el,i)=>{
    el.querySelector('[data-slot-field="start"]').addEventListener('input', e=>{
      day.slots[i].start = e.target.value;
      saveState(); renderSummary(); updateSummaryLine(card, date, day);
    });
    el.querySelector('[data-slot-field="end"]').addEventListener('input', e=>{
      day.slots[i].end = e.target.value;
      saveState(); renderSummary(); updateSummaryLine(card, date, day);
    });
    el.querySelector('[data-slot-field="breakStart"]').addEventListener('input', e=>{
      day.slots[i].breakStart = e.target.value;
      saveState(); renderSummary(); updateSummaryLine(card, date, day);
    });
    el.querySelector('[data-slot-field="breakEnd"]').addEventListener('input', e=>{
      day.slots[i].breakEnd = e.target.value;
      saveState(); renderSummary(); updateSummaryLine(card, date, day);
    });
    el.querySelector('[data-slot-del]').addEventListener('click', ()=>{
      day.slots.splice(i,1); saveState(); renderDayBody(card, date); renderSummary(); updateSummaryLine(card, date, day);
    });

    // Quick start buttons
    el.querySelectorAll('[data-qs]').forEach(b=>{
      b.addEventListener('click', ()=>{
        day.slots[i].start = b.dataset.qs;
        if(!day.slots[i].end){
          // smart default: +60min if morning, +90min if eve
          const sm = timeToMinutes(b.dataset.qs);
          day.slots[i].end = addMinutesToTime(b.dataset.qs, sm < 12*60 ? 60 : 90);
        }
        saveState(); renderDayBody(card, date); renderSummary(); updateSummaryLine(card, date, day);
      });
    });
    // Quick delta buttons (add to end)
    el.querySelectorAll('[data-qd]').forEach(b=>{
      b.addEventListener('click', ()=>{
        const base = day.slots[i].start;
        if(!base) return;
        day.slots[i].end = addMinutesToTime(base, parseInt(b.dataset.qd));
        saveState(); renderDayBody(card, date); renderSummary(); updateSummaryLine(card, date, day);
      });
    });
  });

  // Add slot
  const addBtn = body.querySelector('[data-add-slot]');
  if(addBtn){
    addBtn.addEventListener('click', ()=>{
      // default start: 17:30 (weekday) or 8:30 (weekend)
      const defStart = (isWeekend(date) || isHoliday(date)) ? '8:30' : '17:30';
      day.slots.push({start:defStart, end:'', breakStart:'', breakEnd:''});
      saveState(); renderDayBody(card, date);
    });
  }

  // Day quick actions
  body.querySelectorAll('[data-quick]').forEach(b=>{
    b.addEventListener('click', ()=>{
      const action = b.dataset.quick;
      if(action === 'morning-conf'){
        // 7:30-8:15 朝カンファ ⑦入院診療 カンファレンス・病棟業務
        const exists = (day.slots||[]).some(s=>s.start==='07:30' && s.end==='08:15');
        if(exists){
          alert('既に朝カンファ (7:30-8:15) が登録されています');
          return;
        }
        if(day.slots.length >= 3){
          alert('1日3枠まで入力可能です。他の時間帯を削除してから追加してください');
          return;
        }
        day.slots.push({start:'07:30', end:'08:15', breakStart:'', breakEnd:''});
        day.code = '⑦入院診療';
        day.content = 'カンファレンス・病棟業務';
        saveState(); renderDayBody(card, date); renderSummary(); updateSummaryLine(card, date, day);
      } else if(action === 'prev'){
        const prev = new Date(date); prev.setDate(prev.getDate()-1);
        const pkey = ymdKey(prev);
        const prevDay = getMonth(currentMonth).days[pkey];
        if(!prevDay){ alert('前日にデータがありません'); return; }
        day.shift = prevDay.shift; day.code = prevDay.code; day.content = prevDay.content;
        day.slots = JSON.parse(JSON.stringify(prevDay.slots||[]));
        saveState(); renderDayBody(card, date); renderSummary(); updateSummaryLine(card, date, day);
      } else if(action === 'duplicate-week'){
        const next = new Date(date); next.setDate(next.getDate()+7);
        const nkey = ymdKey(next);
        const period = getReportPeriod(currentMonth);
        if(next > period.end){ alert('来週の同曜日は報告期間外です'); return; }
        const target = getDay(currentMonth, nkey);
        target.shift = day.shift; target.code = day.code; target.content = day.content;
        target.slots = JSON.parse(JSON.stringify(day.slots||[]));
        saveState(); renderAll();
      } else if(action === 'clear'){
        if(!confirm(`${date.getMonth()+1}/${date.getDate()} のデータをクリアしますか?`)) return;
        delete getMonth(currentMonth).days[key];
        saveState(); renderAll();
      }
    });
  });
}

function renderSlot(slot, idx){
  const qs = QUICK_START.map(t=>`<button data-qs="${t}">${t}</button>`).join('');
  const qd = QUICK_END_DELTAS.map(m=>{
    const h = Math.floor(m/60), mm = m%60;
    const label = mm===0?`+${h}h`:`+${h}h${mm}`;
    return `<button data-qd="${m}">${label}</button>`;
  }).join('');
  return `
    <div class="slot-row">
      <div class="row-times">
        <input type="time" data-slot-field="start" value="${slot.start||''}" step="900">
        <span class="sep">〜</span>
        <input type="time" data-slot-field="end" value="${slot.end||''}" step="900">
      </div>
      <div class="quick-pad">
        <span style="font-size:10px;color:var(--muted);align-self:center">開始:</span>${qs}
        <span style="font-size:10px;color:var(--muted);align-self:center;margin-left:4px">終了:</span>${qd}
      </div>
      <div class="row-break">
        <span class="label-mini">休憩</span>
        <input type="time" data-slot-field="breakStart" value="${slot.breakStart||''}" step="900">
        <span class="sep">〜</span>
        <input type="time" data-slot-field="breakEnd" value="${slot.breakEnd||''}" step="900">
        <button data-slot-del class="danger icon" title="この時間帯を削除">×</button>
      </div>
    </div>
  `;
}

function renderTemplatesInline(container){
  if(!container) return;
  if(state.templates.length === 0){
    container.innerHTML = '<small style="color:var(--muted)">テンプレートはメニューで追加できます</small>';
    return;
  }
  container.innerHTML = '<small style="color:var(--muted);font-size:11px;width:100%">📋 業務テンプレート (タップで適用):</small>' +
    state.templates.map((t,i)=>`<button data-tpl="${i}">${t.code} ${escapeHtml(t.content)}</button>`).join('');
  container.querySelectorAll('[data-tpl]').forEach(b=>{
    b.addEventListener('click', ()=>{
      const card = b.closest('.day');
      const key = card.dataset.date;
      const day = getDay(currentMonth, key);
      const tpl = state.templates[parseInt(b.dataset.tpl)];
      day.code = tpl.code; day.content = tpl.content;
      saveState(); renderDayBody(card, parseYmd(key));
    });
  });
}

function updateSummaryLine(card, date, day){
  const head = card.querySelector('.day-head');
  if(!head) return;
  // re-render the whole day card head section by re-calling render
  const dt = dayTotals(date, day);
  const totalMin = dt.weekday_5_22+dt.weekday_22_5+dt.holiday_5_22+dt.holiday_22_5;
  const slotsDesc = (day.slots||[]).filter(s=>s.start&&s.end).map(s=>`${s.start}-${s.end}`).join(' / ');
  const lineEl = head.children[1].querySelector('.summary-line');
  if(totalMin > 0){
    lineEl.className = 'summary-line has';
    lineEl.textContent = `${slotsDesc} (計${minutesToHourStr(totalMin)})`;
  } else if(day.shift){
    lineEl.className = 'summary-line';
    lineEl.textContent = day.shift;
  } else {
    lineEl.className = 'summary-line';
    lineEl.textContent = '—';
  }
  // shift tag update
  const shiftTagWrap = head.children[2];
  shiftTagWrap.innerHTML = day.shift ?
    `<span class="shift-tag ${day.shift==='宿'||day.shift==='宿(休)'||day.shift==='日'||day.shift==='宿日'?'duty':'holi'}">${day.shift}</span>` : '';
  card.classList.toggle('empty', !(day.shift || (day.slots && day.slots.length>0) || day.code));
}

function buildPrintSheet(){
  const {y,m} = ymParts(currentMonth);
  const days = getDaysInPeriod(currentMonth);
  const month = getMonth(currentMonth);
  const t = monthTotals(currentMonth);

  let rows = '';
  for(const d of days){
    const key = ymdKey(d);
    const day = month.days[key] || {shift:'', slots:[], code:'', content:''};
    const isHol = isHolidayDay(d, day);
    const dt = dayTotals(d, day);
    const dow = dowJa(d);
    const dowCls = d.getDay()===0?'sunday':(d.getDay()===6?'saturday':'');
    const bgCls = isHoliday(d) ? 'holiday-bg' : '';

    // Build up to 3 time rows
    const slots = (day.slots && day.slots.length) ? day.slots.slice(0,3) : [];
    while(slots.length < 3) slots.push({start:'',end:'',breakStart:'',breakEnd:''});

    for(let r=0; r<3; r++){
      const s = slots[r];
      const showDate = r === 0;
      const showShift = r === 2;
      // 区分集計 (1行目に表示)
      const wd522 = (r===0 && dt.weekday_5_22>0) ? minutesToHourStr(dt.weekday_5_22) : '';
      const wd225 = (r===0 && dt.weekday_22_5>0) ? minutesToHourStr(dt.weekday_22_5) : '';
      const hd522 = (r===0 && dt.holiday_5_22>0) ? minutesToHourStr(dt.holiday_5_22) : '';
      const hd225 = (r===0 && dt.holiday_22_5>0) ? minutesToHourStr(dt.holiday_22_5) : '';

      let dateCell, dowCell, shiftCell;
      if(showDate){
        dateCell = `<td class="date" rowspan="3">${d.getMonth()+1}/${d.getDate()}</td>`;
        dowCell = `<td class="dow">(${dow})</td>`;
        shiftCell = '';
      } else if(r === 1){
        dateCell = '';
        dowCell = `<td class="dow"></td>`;
        shiftCell = '';
      } else { // r === 2
        dateCell = '';
        dowCell = `<td class="shift">${day.shift || ''}</td>`;
        shiftCell = '';
      }

      const timeCell = s.start && s.end ? `${s.start}<br>〜<br>${s.end}` : '〜';
      const brkCell = s.breakStart && s.breakEnd ? `${s.breakStart}〜${s.breakEnd}` : '〜';

      const hasSlot = (day.slots && day.slots.some(s=>s.start && s.end));
      const codeCell = (r===0 && hasSlot) ? effectiveCode(day) : '';
      const contentCell = (r===0 && hasSlot) ? escapeHtml(effectiveContent(day)) : '';

      rows += `<tr class="${dowCls} ${bgCls}">
        ${dateCell}
        ${dowCell}
        <td class="time">${timeCell}</td>
        <td class="time" style="font-size:7pt">${brkCell}</td>
        <td class="time">${wd522}</td>
        <td class="time">${wd225}</td>
        <td class="time">${hd522}</td>
        <td class="time">${hd225}</td>
        <td class="biz">${codeCell}${codeCell && contentCell?' ':''}${contentCell}</td>
      </tr>`;
    }
  }

  const html = `
    <div class="ph">
      <div></div>
      <div class="ptitle">超過勤務、宿日直勤務命令簿</div>
      <div></div>
    </div>
    <div class="meta">
      <span class="lbl">${y}年</span>
      <span class="lbl">${m}月報告分</span>
      <div></div>
      <span class="lbl">所属</span><div>${escapeHtml(state.profile.affiliation||'')}</div>
      <div></div>
    </div>
    <div class="meta" style="grid-template-columns:auto 1fr auto 1fr auto 1fr">
      <span class="lbl">診療科</span><div>${escapeHtml(state.profile.department||'')}</div>
      <span class="lbl">職員番号</span><div>${escapeHtml(state.profile.employeeId||'')}</div>
      <span class="lbl">氏名</span><div>${escapeHtml(state.profile.name||'')}</div>
    </div>
    <table>
      <thead>
        <tr class="h-row1">
          <th rowspan="3" style="width:5%">日</th>
          <th rowspan="3" style="width:4%">曜<br>/形</th>
          <th rowspan="3" style="width:9%">②実績<br>勤務時間</th>
          <th rowspan="3" style="width:9%">③うち<br>休憩等</th>
          <th colspan="4">④勤務の区分 (超過勤務)</th>
          <th rowspan="3">⑤具体的な業務内容</th>
        </tr>
        <tr>
          <th colspan="2">平日</th>
          <th colspan="2">休日</th>
        </tr>
        <tr>
          <th>5-22時<br>125/100</th>
          <th>22-5時<br>150/100</th>
          <th>5-22時<br>135/100</th>
          <th>22-5時<br>160/100</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
      <tfoot>
        <tr>
          <th colspan="4">小計</th>
          <th>${minutesToHourStr(t.weekday_5_22)}</th>
          <th>${minutesToHourStr(t.weekday_22_5)}</th>
          <th>${minutesToHourStr(t.holiday_5_22)}</th>
          <th>${minutesToHourStr(t.holiday_22_5)}</th>
          <th>合計 ${minutesToHourStr(t.total)}</th>
        </tr>
      </tfoot>
    </table>
    <div class="notes">
      <strong>(備考)</strong>
      <ol>
        <li>勤務形態は休/振/育/宿/宿(休)/日/宿日。通常は空白。</li>
        <li>超過勤務時間を「②実績勤務時間」欄に記入。記入例 17:30〜19:30 / 休憩は③に記入。</li>
        <li>超過勤務の開始時間は17時30分 (救急・集中治療科は除く)。</li>
        <li>業務内容コード: ①分娩 ②手術 ③検査 ④重症患者 ⑤救急患者 ⑥外来患者 ⑦入院診療 ⑧オンコール</li>
        <li>この命令簿は原則として前月21日から始まり当月20日で締める。</li>
        <li>自己研鑽の時間は超過勤務時間に含めない。</li>
      </ol>
    </div>
  `;
  document.getElementById('print-sheet').innerHTML = html;
}

function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// PDF生成・共有
document.getElementById('btn-pdf').addEventListener('click', async ()=>{
  const btn = document.getElementById('btn-pdf');
  const origText = btn.textContent;
  btn.textContent = '⌛ 生成中...';
  btn.disabled = true;
  try{
    buildPrintSheet();
    // print-sheet は通常時 display:none なので一時的に見える状態にしてレンダリング
    const sheet = document.getElementById('print-sheet');
    sheet.style.display = 'block';
    sheet.style.position = 'fixed';
    sheet.style.left = '-9999px';
    sheet.style.top = '0';
    sheet.style.width = '210mm';
    sheet.style.padding = '8mm 6mm';
    sheet.style.background = '#fff';
    sheet.style.zIndex = '-1';

    // html2canvas でレンダリング
    await new Promise(r=>setTimeout(r,50));
    const canvas = await html2canvas(sheet, {scale:2, backgroundColor:'#ffffff', useCORS:true});

    // 元に戻す
    sheet.style.display = '';
    sheet.style.position = '';
    sheet.style.left = '';
    sheet.style.top = '';
    sheet.style.width = '';
    sheet.style.padding = '';
    sheet.style.background = '';
    sheet.style.zIndex = '';

    const {jsPDF} = window.jspdf;
    const pdf = new jsPDF({orientation:'portrait', unit:'mm', format:'a4'});
    const pdfW = 210, pdfH = 297;
    const imgRatio = canvas.height / canvas.width;
    const imgW = pdfW;
    const imgH = pdfW * imgRatio;
    pdf.addImage(canvas.toDataURL('image/jpeg', 0.92), 'JPEG', 0, 0, imgW, Math.min(imgH, pdfH));

    const {y,m} = ymParts(currentMonth);
    const name = (state.profile.name || '超勤簿').replace(/\s+/g,'');
    const filename = `超勤簿_${name}_${y}年${m}月.pdf`;

    // Web Share API (iOS Safari / Android Chrome) で共有
    const pdfBlob = pdf.output('blob');
    const file = new File([pdfBlob], filename, {type:'application/pdf'});

    if(navigator.canShare && navigator.canShare({files:[file]})){
      try{
        await navigator.share({files:[file], title:filename});
      }catch(err){
        if(err.name !== 'AbortError'){
          // 共有失敗時はダウンロード
          pdf.save(filename);
        }
      }
    } else {
      // フォールバック: ダウンロード
      pdf.save(filename);
    }
  }catch(err){
    alert('PDF生成に失敗しました: '+err.message);
    console.error(err);
  }finally{
    btn.textContent = origText;
    btn.disabled = false;
  }
});

// ============================================================
// 公式Excel書き出し
// 元のExcelテンプレート(choukinbo_template.xlsm)の「命令簿」シートの
// 入力セルだけを書き換える。書式・数式・マクロは完全保持される。
// ============================================================

// 時刻文字列 "HH:MM" → Excelのシリアル値(1日=1.0)
function timeToExcelFraction(t){
  const min = timeToMinutes(t);
  if(min == null) return null;
  return min / 1440;
}
function xmlEscape(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
// sheet XML内の指定セルに値を設定 (空セル <c .../> と値ありセル <c ...>...</c> 両対応)
function setSheetCell(xml, ref, value, isText){
  const re = new RegExp('<c r="'+ref+'"((?:[^>]*?/>)|(?:[^>]*?>[\\s\\S]*?</c>))');
  const m = xml.match(re);
  if(!m) throw new Error('セル '+ref+' がテンプレートに見つかりません');
  const sm = m[0].match(/ s="(\d+)"/);
  const style = sm ? ' s="'+sm[1]+'"' : '';
  let neu;
  if(isText){
    neu = '<c r="'+ref+'"'+style+' t="inlineStr"><is><t xml:space="preserve">'+xmlEscape(value)+'</t></is></c>';
  } else {
    neu = '<c r="'+ref+'"'+style+'><v>'+value+'</v></c>';
  }
  return xml.slice(0, m.index) + neu + xml.slice(m.index + m[0].length);
}

document.getElementById('btn-excel').addEventListener('click', async ()=>{
  const btn = document.getElementById('btn-excel');
  const origText = btn.textContent;
  btn.textContent = '⌛ 生成中...';
  btn.disabled = true;
  try{
    if(typeof JSZip === 'undefined'){
      throw new Error('Excel生成ライブラリ(JSZip)が読み込めませんでした。オンライン環境で再度お試しください。');
    }
    // テンプレート取得
    let buf;
    try{
      const resp = await fetch('choukinbo_template.xlsm');
      if(!resp.ok) throw new Error('status '+resp.status);
      buf = await resp.arrayBuffer();
    }catch(err){
      throw new Error('テンプレートファイル「choukinbo_template.xlsm」が見つかりません。index.htmlと同じ場所に置いてください。');
    }

    const zip = await JSZip.loadAsync(buf);
    // 命令簿 = sheet3.xml
    let sheet = await zip.file('xl/worksheets/sheet3.xml').async('string');
    let wbxml = await zip.file('xl/workbook.xml').async('string');

    const {y,m} = ymParts(currentMonth);

    // --- ヘッダー ---
    sheet = setSheetCell(sheet, 'D2', y, false);
    sheet = setSheetCell(sheet, 'D3', m, false);
    if(state.profile.employeeId) sheet = setSheetCell(sheet, 'Y2', state.profile.employeeId, true);
    if(state.profile.name) sheet = setSheetCell(sheet, 'Y3', state.profile.name, true);
    if(state.profile.affiliation) sheet = setSheetCell(sheet, 'O3', state.profile.affiliation, true);
    if(state.profile.department) sheet = setSheetCell(sheet, 'Q3', '診療科 ' + state.profile.department, true);

    // --- 日次データ ---
    const days = getDaysInPeriod(currentMonth);
    const month = getMonth(currentMonth);
    days.forEach((d, idx)=>{
      const key = ymdKey(d);
      const day = month.days[key];
      if(!day) return;
      const baseRow = 10 + idx * 3;  // 各日3行
      // 勤務形態 → C{baseRow+2}
      if(day.shift){
        sheet = setSheetCell(sheet, 'C' + (baseRow+2), day.shift, true);
      }
      // 時間帯 (最大3枠)
      const slots = (day.slots || []).slice(0, 3);
      slots.forEach((s, si)=>{
        const row = baseRow + si;
        const startFr = timeToExcelFraction(s.start);
        const endFr = timeToExcelFraction(s.end);
        if(startFr == null || endFr == null) return;
        sheet = setSheetCell(sheet, 'D' + row, startFr, false);
        sheet = setSheetCell(sheet, 'F' + row, endFr, false);
        // 休憩
        const bsFr = timeToExcelFraction(s.breakStart);
        const beFr = timeToExcelFraction(s.breakEnd);
        if(bsFr != null && beFr != null){
          sheet = setSheetCell(sheet, 'G' + row, bsFr, false);
          sheet = setSheetCell(sheet, 'I' + row, beFr, false);
        }
        // 業務コード・内容 (各枠に記入。未変更ならデフォルト値)
        sheet = setSheetCell(sheet, 'X' + row, effectiveCode(day), true);
        sheet = setSheetCell(sheet, 'Y' + row, effectiveContent(day), true);
      });
    });

    // --- 開いた時に強制再計算 ---
    wbxml = wbxml.replace(/<calcPr ([^/>]*?)\/>/, (full, attrs)=>{
      if(attrs.indexOf('fullCalcOnLoad') !== -1) return full;
      return '<calcPr ' + attrs + ' fullCalcOnLoad="1"/>';
    });

    // --- 書き戻し ---
    zip.file('xl/worksheets/sheet3.xml', sheet);
    zip.file('xl/workbook.xml', wbxml);

    const outBlob = await zip.generateAsync({
      type: 'blob',
      mimeType: 'application/vnd.ms-excel.sheet.macroEnabled.12',
      compression: 'DEFLATE'
    });

    const name = (state.profile.name || '超勤簿').replace(/\s+/g, '');
    const filename = `超勤簿_${name}_${y}年${m}月.xlsm`;
    const file = new File([outBlob], filename, {type:'application/vnd.ms-excel.sheet.macroEnabled.12'});

    if(navigator.canShare && navigator.canShare({files:[file]})){
      try{
        await navigator.share({files:[file], title:filename});
      }catch(err){
        if(err.name !== 'AbortError') downloadBlob(outBlob, filename);
      }
    } else {
      downloadBlob(outBlob, filename);
    }
  }catch(err){
    alert('Excel生成に失敗しました:\n' + err.message);
    console.error(err);
  }finally{
    btn.textContent = origText;
    btn.disabled = false;
  }
});

function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}
